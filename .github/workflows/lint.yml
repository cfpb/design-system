name: Lint check

on: 
    pull_request:
        branches: [main]

permissions: 
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout the repo
              uses: actions/checkout@v6

            - name: Shared setup
              uses:  ./.github/actions/shared-action-setup

            - name: Run lint
              run: CI=true yarn lint
