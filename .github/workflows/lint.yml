name: Lint check

on: 
    pull_request:
        branches: [main]

permissions: 
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout the repo
              uses: actions/checkout@v6

            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                node-version: 22

            - name: Install dependencies with Yarn
              run: |
                corepack enable
                yarn install --immutable

            - name: Run lint
              run: CI=true yarn lint
