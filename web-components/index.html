      <style type="text/css">
  .sidebar-container * {
    font-size: 1rem;
  }

  div.sidebar-item[data-selected='true'],
  button.sidebar-item {
    background-color: var(--teal);
    color: var(--white);
  }

  div.sidebar-item[data-selected='true']:hover,
  button.sidebar-item:hover svg {
    background-color: var(--gray) !important;
    color: var(--white) !important;
  }

  /* Sidebar hover */
  div.sidebar-item[data-selected='false']:hover,
  button.sidebar-item:hover {
    background-color: var(--gray);
    color: var(--white);
  }

  /* Sidebar hover/selected icons */
  div.sidebar-item[data-selected='false']:hover svg,
  button.sidebar-item:hover svg {
    color: var(--white);
  }

  /* Sidebar icons */
  .sidebar-item svg {
    color: var(--black);
  }

  /* Brand logo sizing */
  .sidebar-header a img,
  .sidebar-header img {
    height: 40px;
    width: auto;
    max-height: 40px;
    max-width: none;
  }

  /* Hides the three-dot context menu button in the sidebar */
  button[data-testid='context-menu'] {
    display: none !important;
  }
</style>
 

    <style>
      #storybook-root[hidden] {
        display: none !important;
      }
    </style>

    
    <link href="./sb-addons/storybook-4/manager-bundle.css" rel="stylesheet" />
    
  </head>
  <body>
    <div id="root"></div>

    
    <script>
      
        
          window['FEATURES'] = {
  "actions": true,
  "argTypeTargetsV7": true,
  "babelRemoveBugfixes": false,
  "backgrounds": true,
  "changeDetection": true,
  "componentsManifest": false,
  "controls": true,
  "disallowImplicitActionsInRenderV8": true,
  "highlight": true,
  "interactions": true,
  "legacyDecoratorFileOrder": false,
  "measure": true,
  "outline": true,
  "menuOnboardingChecklist": true,
  "sidebarOnboardingChecklist": true,
  "viewport": true
};
        
      
        
          window['REFS'] = {};
        
      
        
          window['LOGLEVEL'] = "info";
        
      
        
          window['DOCS_OPTIONS'] = {
  "defaultName": "Overview"
};
        
      
        
          window['CONFIG_TYPE'] = "PRODUCTION";
        
      
        
          window['DOCGEN_STORY_PREPARED'] = false;
        
      
        
      
        
      
        
          window['TAGS_OPTIONS'] = {};
        
      
        
          window['STORYBOOK_BUILDER'] = "vite";
        
      
        
          window['STORYBOOK_FRAMEWORK'] = "web-components-vite";
        
      
        
          window['STORYBOOK_RENDERER'] = "web-components";
        
      
        
      
    </script>
    

    <script type="module">
      import './sb-manager/globals-runtime.js';

      import './sb-manager/runtime.js';
    </script>
