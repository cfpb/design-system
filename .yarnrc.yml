defaultSemverRangePrefix: ""

enableGlobalCache: false

enableMirror: true

enableTelemetry: false

nodeLinker: node-modules

npmMinimalAgeGate: 0

supportedArchitectures:
  cpu:
    - current
    - x64
    - arm64
  libc:
    - current
    - glibc
    - musl
  os:
    - current
    - darwin
    - linux
